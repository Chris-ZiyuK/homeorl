# ── E3 Beta: Safety-Transfer Sequence ───────────────────────
# Safety/avoidance skills learned first, then applied to
# resource management tasks. Mixed transfer pattern.

task_sequence: beta
boundary_mode: carryover
carryover_min_energy: 3.0
num_seeds: 20
episodes_per_task: 600
eval_interval: 50
eval_episodes: 40
save_checkpoints: true

agents:
  - A_task_only
  - B_energy_aware
  - C_hace
  - D_pure_homeostatic
  - E_task_oracle
  - F_ewc
  - G_l2
  - H_er
  - I_hace_ewc

logging:
  save_dir: experiments/sequential_results/e3_beta
  plot_name: e3_beta.png
  json_name: e3_beta.json

# ── E3 Gamma: Interference Sequence ─────────────────────────
# Deliberately conflicting strategies (conservation → sprint).
# Tests how robust each method is to negative transfer.

task_sequence: gamma
boundary_mode: carryover
carryover_min_energy: 3.0
num_seeds: 20
episodes_per_task: 600
eval_interval: 50
eval_episodes: 40
save_checkpoints: true

agents:
  - A_task_only
  - B_energy_aware
  - C_hace
  - D_pure_homeostatic
  - E_task_oracle
  - F_ewc
  - G_l2
  - H_er
  - I_hace_ewc

logging:
  save_dir: experiments/sequential_results/e3_gamma
  plot_name: e3_gamma.png
  json_name: e3_gamma.json

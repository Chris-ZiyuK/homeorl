tasks:
  - reach
  - recharge
  - hazard_reach
  - detour
  - tight_detour

agents:
  - A_task_only
  - B_energy_aware
  - C_task_homeostatic
  - D_pure_homeostatic
  - E_task_oracle

episodes_per_task: 80
eval_interval: 20
eval_episodes: 12
num_seeds: 1
success_threshold: 0.65
boundary_mode: carryover
carryover_min_energy: 1.0

agent:
  hidden_dim: 96
  lr: 0.0005
  gamma: 0.99
  batch_size: 32
  buffer_size: 4000
  target_update: 20
  eps_start: 1.0
  eps_end: 0.05
  eps_decay: 150

environment:
  internal_coef: 1.0
  task_reward_coef: 1.0

logging:
  save_dir: experiments/sequential_results/pilot_carryover
  plot_name: sequential_agent_suite_pilot.png
  json_name: sequential_agent_suite_pilot.json

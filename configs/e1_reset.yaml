# E1 Formal Experiment - Reset Boundary Mode
# 5 seeds, 600 episodes/task, full-scale agent architecture
tasks:
  - reach
  - recharge
  - hazard_reach
  - detour
  - tight_detour

agents:
  - A_task_only
  - B_energy_aware
  - C_task_homeostatic
  - D_pure_homeostatic
  - E_task_oracle

episodes_per_task: 600
eval_interval: 50
eval_episodes: 40
num_seeds: 5
success_threshold: 0.7
boundary_mode: reset
carryover_min_energy: 1.0

agent:
  hidden_dim: 128
  lr: 0.0005
  gamma: 0.99
  batch_size: 64
  buffer_size: 20000
  target_update: 25
  eps_start: 1.0
  eps_end: 0.05
  eps_decay: 300

environment:
  internal_coef: 1.0
  task_reward_coef: 1.0

logging:
  save_dir: experiments/sequential_results/e1_reset
  plot_name: e1_reset.png
  json_name: e1_reset.json
